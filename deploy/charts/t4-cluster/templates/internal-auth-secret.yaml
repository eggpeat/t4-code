{{- if .Values.enabled }}
{{- $name := .Values.internalAuth.secretName }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "t4-cluster.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  token: {{ if and $existing $existing.data $existing.data.token }}{{ index $existing.data "token" }}{{ else }}{{ randAlphaNum 64 | b64enc }}{{ end }}
{{- end }}
