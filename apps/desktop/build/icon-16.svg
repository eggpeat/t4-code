<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!--
    Pixel-hinted 16px master for the T4 Code icon. Same design system as
    icon.svg (near-black chassis, white pi, Pi Pink cap) but drawn on the
    16px grid: no sub-pixel edges, connector slots omitted, and a 1px gap
    separates the pink cap from the right leg so it reads as a deliberate
    connector instead of merged mud.
  -->
  <rect x="1" y="1" width="14" height="14" rx="3.5" fill="#0d0d0d"/>
  <!-- Pixel-aligned 1px inner rim, same neutral as the large masters -->
  <rect x="1.5" y="1.5" width="13" height="13" rx="3" fill="none" stroke="#4d4d4d" stroke-width="1"/>
  <rect x="3" y="4" width="10" height="2" fill="#fafafa"/>
  <rect x="5" y="6" width="2" height="6" fill="#fafafa"/>
  <rect x="9" y="6" width="2" height="3" fill="#fafafa"/>
  <!-- Pink connector cap, 1px separated, 1px wider than the leg per side -->
  <rect x="8" y="10" width="4" height="2" fill="#e83174"/>
</svg>
