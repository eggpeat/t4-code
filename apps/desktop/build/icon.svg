<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    T4 Code desktop icon.
    Glyph geometry derives from packages/ui/src/assets/omp-mark.svg
    (oh-my-pi pi + plugin connector), boldened for small-size legibility and
    stripped of tiny detail (decorative dots removed). Colors: neutral
    near-black chassis, near-white pi ink, Pi Pink #e83174 connector.
    Chassis inset is 128/1024 = 12.5% safe margin for macOS masking;
    everything outside the rounded contour stays transparent.
    Render icon.png via scripts/render-desktop-icon.mjs.
  -->
  <!-- Chassis -->
  <rect x="128" y="128" width="768" height="768" rx="172" fill="#0d0d0d"/>
  <!-- Restrained neutral inner rim (1px-equivalent at dock sizes) keeps the
       chassis legible on near-black docks; flat stroke, no shadow/gradient -->
  <rect x="133" y="133" width="758" height="758" rx="167" fill="none" stroke="#4d4d4d" stroke-width="10"/>
  <!-- Pi glyph + plugin connector, mark source space scaled x5.
       Strokes are boldened vs the UI mark so they hold >=1.5px at 16px;
       horizontally centered (mass-weighted center ~= geometric center),
       vertically nudged down 12px against the top-heavy bar. -->
  <g transform="translate(212 299) scale(5)">
    <!-- Horizontal bar -->
    <rect x="10" y="6" width="100" height="20" rx="4" fill="#fafafa"/>
    <!-- Left leg -->
    <rect x="23" y="26" width="20" height="58" rx="4" fill="#fafafa"/>
    <!-- Right leg -->
    <rect x="71" y="26" width="20" height="41" rx="4" fill="#fafafa"/>
    <!-- Plugin connector -->
    <rect x="67" y="58" width="28" height="20" rx="5" fill="#e83174"/>
    <rect x="73" y="62" width="5" height="12" rx="2" fill="#0d0d0d"/>
    <rect x="84" y="62" width="5" height="12" rx="2" fill="#0d0d0d"/>
  </g>
</svg>
