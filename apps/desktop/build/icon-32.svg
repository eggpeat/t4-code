<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!--
    Pixel-hinted 32px master for the T4 Code icon. Same design system as
    icon.svg but on the 32px grid: integer edges, connector slots omitted,
    1px gap between the right leg and the Pi Pink cap.
  -->
  <rect x="3" y="3" width="26" height="26" rx="6.5" fill="#0d0d0d"/>
  <!-- Pixel-aligned 1px inner rim, same neutral as the large masters -->
  <rect x="3.5" y="3.5" width="25" height="25" rx="6" fill="none" stroke="#4d4d4d" stroke-width="1"/>
  <rect x="6" y="8" width="20" height="4" fill="#fafafa"/>
  <rect x="10" y="12" width="4" height="12" fill="#fafafa"/>
  <rect x="18" y="12" width="4" height="6" fill="#fafafa"/>
  <!-- Pink connector cap, 1px separated, 1px wider than the leg per side -->
  <rect x="17" y="19" width="6" height="4" fill="#e83174"/>
</svg>
