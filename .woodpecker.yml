when:
  - event:
      - push
      - pull_request
      - manual
      - deployment

clone:
  git:
    image: mirror.gcr.io/woodpeckerci/plugin-git:2.6.5
    settings:
      depth: 50
      partial: false

steps:
  dependencies:
    image: mirror.gcr.io/library/node:24.13.1-bookworm
    commands:
      - corepack enable
      - pnpm install --frozen-lockfile
      - pnpm exec playwright install --with-deps chromium
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-ci-untrusted
        resources:
          requests:
            cpu: "0"
            memory: 512Mi
            ephemeral-storage: 1Gi
          limits:
            cpu: "1"
            memory: 2Gi
            ephemeral-storage: 4Gi

  upstream-core:
    depends_on: [dependencies]
    image: mirror.gcr.io/library/node:24.13.1-bookworm
    commands:
      - corepack enable
      - pnpm check
      - pnpm test
      - pnpm build
      - pnpm test:e2e
      - pnpm test:packaging
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-ci-untrusted
        resources:
          requests:
            cpu: "0"
            memory: 1Gi
            ephemeral-storage: 2Gi
          limits:
            cpu: "2"
            memory: 6Gi
            ephemeral-storage: 8Gi

  upstream-tooling:
    depends_on: [upstream-core]
    image: mirror.gcr.io/library/node:24.13.1-bookworm
    commands:
      - corepack enable
      - pnpm test:tooling
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-ci-untrusted
        resources:
          requests:
            cpu: "0"
            memory: 512Mi
            ephemeral-storage: 512Mi
          limits:
            cpu: "1"
            memory: 2Gi
            ephemeral-storage: 2Gi

  legacy-authority-source:
    depends_on: [upstream-tooling]
    image: mirror.gcr.io/alpine/git:2.49.1
    commands:
      - git init .continuity/omp
      - git -C .continuity/omp remote add origin https://github.com/lyc-aon/oh-my-pi.git
      - git -C .continuity/omp fetch --depth=1 origin 8476f4451ed95c5d5401785d279a93d3c659fac4
      - git -C .continuity/omp checkout --detach FETCH_HEAD
      - test "$(git -C .continuity/omp rev-parse HEAD)" = 8476f4451ed95c5d5401785d279a93d3c659fac4
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-ci-untrusted
        resources:
          requests:
            cpu: "0"
            memory: 128Mi
            ephemeral-storage: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
            ephemeral-storage: 1Gi

  legacy-authority-build:
    depends_on: [legacy-authority-source]
    image: mirror.gcr.io/oven/bun:1.3.14
    commands:
      - cd .continuity/omp && bun install --frozen-lockfile
      - cd .continuity/omp && bun run build:native
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-ci-untrusted
        resources:
          requests:
            cpu: "0"
            memory: 512Mi
            ephemeral-storage: 1Gi
          limits:
            cpu: "2"
            memory: 4Gi
            ephemeral-storage: 6Gi

  legacy-bridge-continuity:
    depends_on: [legacy-authority-build]
    image: mirror.gcr.io/library/node:24.13.1-bookworm
    environment:
      T4_OMP_SOURCE_DIR: /woodpecker/src/.continuity/omp
    commands:
      - corepack enable
      - pnpm test:legacy-bridge-continuity
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-ci-untrusted
        resources:
          requests:
            cpu: "0"
            memory: 512Mi
            ephemeral-storage: 512Mi
          limits:
            cpu: "1"
            memory: 2Gi
            ephemeral-storage: 2Gi

  android-debug:
    depends_on: [legacy-bridge-continuity]
    image: cimg/android:2026.03.1-node
    commands:
      - corepack enable
      - pnpm --filter @t4-code/mobile check:android:debug
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-ci-untrusted
        resources:
          requests:
            cpu: "0"
            memory: 1Gi
            ephemeral-storage: 2Gi
          limits:
            cpu: "2"
            memory: 5Gi
            ephemeral-storage: 8Gi

  cluster-ci-contracts:
    depends_on: [android-debug]
    image: mirror.gcr.io/library/node:24.13.1-bookworm
    commands:
      - corepack enable
      - pnpm test:cluster:ci
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-ci-untrusted
        resources:
          requests:
            cpu: "0"
            memory: 256Mi
            ephemeral-storage: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
            ephemeral-storage: 1Gi

  cluster-server-tests:
    depends_on: [cluster-ci-contracts]
    image: mirror.gcr.io/library/node:24.13.1-bookworm
    commands:
      - corepack enable
      - pnpm --filter @t4-code/cluster-server test
      - pnpm --filter @t4-code/cluster-server typecheck
      - pnpm --filter @t4-code/host-wire test
      - pnpm --filter @t4-code/host-service test
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-ci-untrusted
        resources:
          requests:
            cpu: "0"
            memory: 256Mi
            ephemeral-storage: 256Mi
          limits:
            cpu: "1"
            memory: 2Gi
            ephemeral-storage: 2Gi

  cluster-operator-tests:
    depends_on: [cluster-server-tests]
    image: mirror.gcr.io/library/golang:1.25.1-bookworm
    directory: packages/cluster-operator
    commands:
      - go test ./...
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-ci-untrusted
        resources:
          requests:
            cpu: "0"
            memory: 256Mi
            ephemeral-storage: 256Mi
          limits:
            cpu: "1"
            memory: 2Gi
            ephemeral-storage: 2Gi

  cluster-chart-tests:
    depends_on: [cluster-operator-tests]
    image: mirror.gcr.io/alpine/helm:3.19.0
    commands:
      - helm lint deploy/charts/t4-cluster
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-ci-untrusted
        resources:
          requests:
            cpu: "0"
            memory: 128Mi
            ephemeral-storage: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
            ephemeral-storage: 512Mi

  build-controller:
    depends_on: [cluster-chart-tests]
    image: mirror.gcr.io/moby/buildkit:v0.30.0-rootless
    environment:
      BUILDKIT_ADDR: tcp://woodpecker-buildkitd.linkedin-ci.svc.cluster.local:1234
      HARBOR_REGISTRY: harbor.linkedin-registry.svc.cluster.local
      HARBOR_PROJECT: linkedin-bot
      HARBOR_USERNAME:
        from_secret: t4_harbor_username
      HARBOR_PASSWORD:
        from_secret: t4_harbor_password
    commands:
      - scripts/cluster-ci/build-image.sh controller t4-cluster-operator cluster/images/controller/Dockerfile
    when:
      - event: push
        branch: main
      - event: manual
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-ci-untrusted
        resources:
          requests:
            cpu: "0"
            memory: 256Mi
            ephemeral-storage: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
            ephemeral-storage: 1Gi

  sbom-controller:
    depends_on: [build-controller]
    image: anchore/syft:1.33.0
    environment:
      HARBOR_REGISTRY: harbor.linkedin-registry.svc.cluster.local
      HARBOR_PROJECT: linkedin-bot
      HARBOR_USERNAME:
        from_secret: t4_harbor_username
      HARBOR_PASSWORD:
        from_secret: t4_harbor_password
    commands:
      - scripts/cluster-ci/capture-image-evidence.sh sbom controller t4-cluster-operator
    when:
      - event: push
        branch: main
      - event: manual
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-ci-untrusted
        resources:
          requests:
            cpu: "0"
            memory: 256Mi
            ephemeral-storage: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
            ephemeral-storage: 2Gi

  vulnerability-controller:
    depends_on: [sbom-controller]
    image: aquasec/trivy:0.66.0
    environment:
      HARBOR_REGISTRY: harbor.linkedin-registry.svc.cluster.local
