    depends_on: [provenance-session-runtime]
    image: mirror.gcr.io/library/node:24.13.1-bookworm
    commands:
      - node scripts/cluster-ci/assemble-image-manifest.mjs
      - node scripts/cluster-ci/validate-proof.mjs artifacts/cluster-proof/image-publication.json --images-only
    when:
      - event: push
        branch: main
      - event: manual
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-ci-untrusted
        resources:
          requests:
            cpu: "0"
            memory: 128Mi
            ephemeral-storage: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
            ephemeral-storage: 1Gi

  live-cluster-proof:
    depends_on: [cluster-chart-tests]
    image: mcr.microsoft.com/playwright:v1.61.1-noble
    environment:
      T4_CLUSTER_NAMESPACE: t4-development
      T4_CLUSTER_BASE_URL:
        from_secret: t4_cluster_base_url
      T4_CLUSTER_AUTH_TOKEN:
        from_secret: t4_cluster_proof_token
      T4_IMAGE_PUBLICATION_MANIFEST_URL:
        from_secret: t4_image_publication_manifest_url
      T4_OBSERVABILITY_MANIFEST_URL:
        from_secret: t4_observability_manifest_url
    commands:
      - corepack enable
      - pnpm test:cluster:e2e
      - node scripts/cluster-ci/collect-readonly-cluster.mjs
      - node scripts/cluster-ci/assemble-proof.mjs
      - node scripts/cluster-ci/validate-proof.mjs artifacts/cluster-proof/manifest.json
    when:
      - event: deployment
        environment: development
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-dev-verifier
        resources:
          requests:
            cpu: "0"
            memory: 1Gi
            ephemeral-storage: 1Gi
          limits:
            cpu: "2"
            memory: 4Gi
            ephemeral-storage: 6Gi

  verify:
    depends_on:
      - cluster-chart-tests
    image: mirror.gcr.io/library/alpine:3.22.1
    commands:
      - test -f package.json
    when:
      - event:
          - push
          - pull_request
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-ci-untrusted
        resources:
          requests:
            cpu: "0"
            memory: 32Mi
            ephemeral-storage: 16Mi
          limits:
            cpu: 100m
            memory: 64Mi
            ephemeral-storage: 64Mi
